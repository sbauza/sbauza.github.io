theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "default"

# Site Settings
locale: "en-US"
title: "Sylvain Bauza"
subtitle: "OpenStack et. al."
name: "Sylvain Bauza"
description: "Presentations and writings about OpenStack and AI."
url: "https://sbauza.github.io"
repository: "sbauza/sbauza.github.io"
enable_copy_code_button: true
search: true

# Analytics
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-ERF97D749R"

# Comments
comments:
  provider: "giscus"
  giscus:
    repo_id: "MDEwOlJlcG9zaXRvcnkxNjcwMjM5MA=="
    category_name: "Announcements"
    category_id: "DIC_kwDOAP7bts4C666t"
    mapping: "pathname"
    reactions_enabled: "1"
    theme: "light"

# Site Author (left sidebar)
author:
  name: "Sylvain Bauza"
  avatar: "https://avatars.githubusercontent.com/u/3694158?v=4"
  bio: "Principal Software Engineer working on OpenStack Nova, GPU virtualization, and AI agentic integration."
  location: "Grenoble, France"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/sbauza"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/sylvainbauza/"
    - label: "X"
      icon: "fab fa-fw fa-square-x-twitter"
      url: "https://x.com/sylvainbauza"

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/sbauza"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/sylvainbauza/"
    - label: "X"
      icon: "fab fa-fw fa-square-x-twitter"
      url: "https://x.com/sylvainbauza"

# Reading Files
include:
  - _pages
exclude:
  - vendor
  - .bundle
  - .sass-cache
  - Gemfile
  - LICENSE
  - README.md
  - editor/

# Conversion
markdown: kramdown
highlighter: rouge

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Europe/Paris
paginate: 5
paginate_path: /page:num/

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      comments: true
