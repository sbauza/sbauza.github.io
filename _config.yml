theme: jekyll-theme-chirpy

lang: en

timezone: Europe/Paris

title: Sylvain Bauza

tagline: Software Engineer — OpenStack & Cloud Computing

description: >-
  Sylvain Bauza's personal site. Projects, presentations, and writings
  about OpenStack, cloud computing, and AI.

url: "https://sbauza.github.io"

github:
  username: sbauza

social:
  name: Sylvain Bauza
  links:
    - https://github.com/sbauza

avatar: https://avatars.githubusercontent.com/u/3694158?v=4

toc: true

theme_mode:

paginate: 10

baseurl: ""

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "package*.json"
  - editor/

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
